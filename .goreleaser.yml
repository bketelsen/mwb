version: 2

builds:
  - id: mwb-linux
    main: ./cmd/mwb
    binary: mwb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: mwb-darwin
    main: ./cmd/mwb
    binary: mwb
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: mwb
    package_name: mwb
    file_name_template: "{{ .ConventionalFileName }}"
    ids:
      - mwb-linux
    vendor: Brian Ketelsen
    homepage: https://github.com/bketelsen/mwb
    maintainer: Brian Ketelsen <mail@bjk.dev>
    description: Mouse Without Borders Linux client
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/mwb.service
        dst: /usr/lib/systemd/user/mwb.service
        type: config
      - src: packaging/99-mwb.rules
        dst: /usr/lib/udev/rules.d/99-mwb.rules
        type: config
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh

brews:
  - name: mwb
    repository:
      owner: bketelsen
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/bketelsen/mwb
    description: Mouse Without Borders client for Linux and macOS
    license: MIT
    install: |
      bin.install "mwb"
    service: |
      run opt_bin/"mwb"
      keep_alive true
      log_path var/"log/mwb.log"
      error_log_path var/"log/mwb.log"
    caveats: |
      On macOS, grant Accessibility permissions before starting:
        System Settings > Privacy & Security > Accessibility > Add mwb

      On Linux, set up uinput access:
        sudo modprobe uinput
        echo 'KERNEL=="uinput", GROUP="input", MODE="0660"' | \
          sudo tee /etc/udev/rules.d/99-uinput.rules
        sudo udevadm control --reload-rules && sudo udevadm trigger
        sudo usermod -aG input $USER

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
